<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
        display:grid;
        justify-content: center;
    }
    #conteudo{
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        font-family: fantasy;
        color: darkgreen;
    }
    #telas_span{
        width:100%;
    }
    #tela_0{
        font-size: 75px;
        font-family: fantasy;
        color: darkcyan;
        text-shadow:4px 2px black;
        border: 1px solid;
        position: fixed;
        height: 95%;
        width: 99%;
        z-index: 2;
        top: 31px;
        justify-content:center;
        text-align: center;
        background-color: aqua;
        border-radius: 15px;
    }
    #telas_span span{
        position: absolute;
        border: 1px solid;
        left: 5%;
        width: 90%;
        background-color: cadetblue;
        height: -webkit-fill-available;
        border-radius: 25px;
        text-align: center;
    }
    #span_b{
        display:flex;
        flex-direction: column;
        align-items: center;
    }
    #span_a div{
        display:flex;
        justify-content:space-around;
    }
    #botoes_bar{
        width: 100%;
        display: flex;
        justify-content: space-evenly;
    }
    #botoes_bar button{
        width: 121px;
        height: 25px;
        margin: -1px 20px;
        border-radius: 5px;
        border: 1px solid;
        position: relative;
        cursor: pointer;
        background-color: darkcyan;
        font-family: fantasy;
        font-size: small;
        color: aliceblue;
    }
    #telas_span span div img{
        cursor: pointer;
    }
    #span_b0 div{
        position:fixed;
        display: flex;
        flex-direction: column;
    }
    #span_b0 p{
        margin: 10px 15px;
        font-family: fantasy;
    }
    #span_b input{
        font-family: fantasy;
        color: darkcyan;
        font-size: medium;
        display:flex;
        text-align:center;
    }
    #span_b label{
        font-family: cursive;
        color: aliceblue;
        font-size: medium;
        display:flex;
        text-align:center;
    }
 
    </style>
</head>
<body>
    <span id="tela_0"><p>Bem Vindo ao Estoque Verificador</p></span>
    <div id="botoes_bar"> 

        <button id="botao_a">Produtos</button>
        
        <button id="botao_b">Cadastramento</button>
        
        <button id="botao_c">Transporte</button>
    </div>
    <section id="conteudo">
        
        <div id="telas_span">
            
            <span id="span_a" style="z-index: 1;">
                <div>
                    <p style="
                    background-color: antiquewhite;
                    width: 100px;height: 25px;
                    align-content: center;
                    border-radius: 5px;">ID</p>
                    <p style="
                    background-color: antiquewhite;
                    width: 100px;height: 25px;
                    align-content: center;
                    border-radius: 5px;">Nome</p>
                    <p style="
                    background-color: antiquewhite;
                    width: 100px;height: 25px;
                    align-content: center;
                    border-radius: 5px;">Marca</p>
                    <p style="
                    background-color: antiquewhite;
                    width: 100px;height: 25px;
                    align-content: center;
                    border-radius: 5px;">Quantidade</p>
                    <p style="
                    background-color: antiquewhite;
                    width: 100px;height: 25px;
                    align-content: center;
                    border-radius: 5px;">Peso</p>
                </div>
            </span>
            <span id="span_b" style="z-index: 0;">
                <p id="msg" style="
                    background-color:green; display:none;
                    border-bottom-right-radius:15px;
                    border-top-right-radius: 5px;
                    border-top-left-radius:20px;
                    border-bottom-left-radius:5px;
                    padding: 10px;
                    font-family: fantasy;
                    color: aliceblue;
                    text-shadow: 2px 2px black;
                    ">Dados Salvos</p>
                
                <select id='select_0' style="
                    font-family: fantasy;
                    margin: 55px 0px;
                    width: 280px;
                    height: 50px;
                    color: darkcyan;">
                    <option>Selecionar</option>
                    <option>Pack Completo</option>
                    <option>Unidade Fracionada</option>
                    <option>Personalizado</option>
                </select>
                <select id="select_a"
                    style="
                    display:none;
                    font-family: fantasy;
                    margin: 15px 0px;
                    width: 280px;
                    height: 50px;
                    color: darkcyan;">
                    <option>Selecionar</option>
                    <option>Bebida Alcoólica</option>
                    <option>Suco</option>
                    <option>Refrigerante</option>
                    <option>Bolacha</option>
                    <option>Arroz</option>
                    <option>Feijão</option>
                    <option>Açucar</option>
                </select>
                <div style="display:none;" id="formulario_geral">
                    <label for="id_txt">ID</label>
                    <input id='id_txt' type="number" readonly="true" >
                    <label for="nome">Nome do Produto</label>
                    <input id="nome" type="text" placeholder="Nome do Produto">
                    <label for="marca">Marca do Produto</label>
                    <input id="marca" type="text" placeholder="Marca do Produto">
                    <label for="Unidade">Quantidade</label>
                    <input id="unidade" placeholder="Unidade por Pack" type="number">
                    <label for="peso">Peso do Produto Kg</label>
                    <input id="peso" type="number" step="0.01" > 
                    <button id="confirma_cadastro">CADASTRAR</button>
                </div>
            </span>
            <span id="span_c" style="z-index: 0;">C</span>
        </div>
    </section>
    <script>
        
        document.querySelector('#id_txt').style.pointerEvents='none'
        // function verificar_window(){
        //     if(window.window.innerWidth<=690){
                
        //     }
            
        function msg_animation(){
            document.querySelector('#msg').style.display='block'
            setTimeout(function(){document.querySelector('#msg').animate([{transform:'rotate3d(1,0,0,0deg)'},{transform:'rotate3d(1,0,0,90deg)'}],{duration:250})},2245)
            setTimeout(function(){document.querySelector('#msg').style.display='none'},2500)
        }

        function ativa_animacao(id_valor){
            document.querySelector(id_valor).animate([{transform:'rotate3d(0,1,0,0deg)'},{transform:'rotate3d(0,1,0,90deg)'}],{duration:900})
        }
        function anima_return(id_valor){
            document.querySelector(id_valor).animate([{left:'10%'},{left:'5%'}],{duration:500})
        };
        function resetar_span(){
            document.querySelector('#span_a').style.zIndex='0',
            document.querySelector('#botao_a').style.top='0px',
            document.querySelector('#botao_a').style.borderBottom='1px solid',
            document.querySelector('#botao_a').style.backgroundColor='darkcyan',
            document.querySelector('#botao_a').style.zIndex='1';

            document.querySelector('#span_b').style.zIndex='0',
            document.querySelector('#botao_b').style.top='0px',
            document.querySelector('#botao_b').style.borderBottom='1px solid',
            document.querySelector('#botao_b').style.backgroundColor='darkcyan',
            document.querySelector('#botao_b').style.zIndex='1';

            document.querySelector('#span_c').style.zIndex='0';
            document.querySelector('#botao_c').style.top='0px',
            document.querySelector('#botao_c').style.borderBottom='1px solid',
            document.querySelector('#botao_c').style.backgroundColor='darkcyan',
            document.querySelector('#botao_c').style.zIndex='1'

        }

        function ativar_span(span_id, botao_id){
            resetar_span()
                document.querySelector(span_id).style.zIndex='1'
                document.querySelector(botao_id).style.top='2px',
                document.querySelector(botao_id).style.borderBottom='none',
                document.querySelector(botao_id).style.backgroundColor='cadetblue',
                document.querySelector(botao_id).style.zIndex='2'
            
        };
        
        //Funções de click nos valores de select do cadastramento
        
        event_target=''
        event_target0=''
        document.querySelector('select').addEventListener('change', 
            function(event){
                for(a=0;a<document.querySelectorAll('#span_b input').length;a++){
                        document.querySelectorAll('#span_b input')[a].value=''
                    };
                if(event.target.value=='Pack Completo'){
                    
                    document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)
                    document.querySelector('#formulario_geral').style.display='block'
                    document.querySelector('#select_a').style.display='block'
                    document.querySelector('#peso').readOnly='true'
                    document.querySelector('#peso').style.pointerEvents='none'
                    event_target=event.target.value
                }
                if(event.target.value=='Unidade Fracionada'){
            
                    document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)
                    document.querySelector('#formulario_geral').style.display='block'
                    document.querySelector('#select_a').style.display='none'
                    document.querySelector('#peso').readOnly=''
                    document.querySelector('#peso').style.pointerEvents=''
                    event_target=event.target.value}
                if(event.target.value=='Personalizado'){
                    
                    document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)
                    document.querySelector('#formulario_geral').style.display='block'
                    document.querySelector('#select_a').style.display='none'
                    document.querySelector('#peso').readOnly=''
                    document.querySelector('#peso').style.pointerEvents=''
                    event_target=event.target.value}
                if(event.target.value=='Selecionar'){
                    document.querySelector('#formulario_geral').style.display='none'
                    document.querySelector('#select_a').style.display='none'
                    document.querySelector('#peso').readOnly=''
                    document.querySelector('#peso').style.pointerEvents=''
                    event_target=event.target.value}
        });

        document.querySelector('#select_a').addEventListener('change', function(e){
                    if(e.target.value!='Selecionar'){
                        event_target0=e.target.value
                    }
                    if(e.target.value=='Arroz'){
                        document.querySelector('#peso').value=5,
                        document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)}
                    if(e.target.value=='Bebida Alcoólica'){
                        document.querySelector('#peso').value=0.320,
                        document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)}
                    if(e.target.value=='Refrigerante'){
                        document.querySelector('#peso').value=2,
                        document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)}
                    if(e.target.value=='Bolacha'){
                        document.querySelector('#peso').value=0.120,
                        document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)}
                    if(e.target.value=='Feijão'||e.target.value=='Açucar'||e.target.value=='Suco'){
                        document.querySelector('#peso').value=1,
                        document.querySelector('#id_txt').value=Math.ceil((Math.random()+Math.random())*Math.PI)}
                    
                    
                })
        
        function criar_prd(){
            document.querySelector('#select_0').selectedIndex=document.querySelector('#select_0')[0]
            document.querySelector('#select_a').selectedIndex=document.querySelector('#select_a')[0]
            document.querySelector('#select_a').style.display='none'
            verificador=0
            for(a=0;a<document.querySelectorAll('#span_a div p').length;a++){
                if(document.querySelectorAll('#span_a div p')[a].innerHTML==document.querySelector('#span_b #nome').value){
                verificador=verificador+1}
            }
            
            if(verificador===0){
                msg_animation();
                tag = document.createElement('div')
                tag.style.backgroundColor='antiquewhite'
                tag.style.height='30px'
                tag.style.dispaly='flex'
                tag.style.alignItems='center'
                tag.id='valor_produtos'
                lista =[document.createElement('p'),
                document.createElement('p'),
                document.createElement('p'),
                document.createElement('p'),
                document.createElement('p')
                ]
                for(a=0;a<lista.length;a++){
                    lista[a].style.width='75px'
                    lista[a].style.backgroundColor='darkgray'
                    }
            };
            
            if(event_target=='Pack Completo'&&verificador===0){
                console.log(event_target0)
                if(event_target0=='Bebida Alcoólica'||event_target0=='Suco'||event_target0=='Refrigerante'){
                    lista[0].innerHTML = document.querySelector('#id_txt').value
                    lista[1].innerHTML = document.querySelector('#nome').value
                    lista[2].innerHTML = document.querySelector('#marca').value
                    lista[3].innerHTML = document.querySelector('#unidade').value*12
                    lista[4].innerHTML = document.querySelector('#peso').value+'KG'
                }
                if(event_target0=='Bolacha'){
                    lista[0].innerHTML = document.querySelector('#id_txt').value
                    lista[1].innerHTML = document.querySelector('#nome').value
                    lista[2].innerHTML = document.querySelector('#marca').value
                    lista[3].innerHTML = document.querySelector('#unidade').value*24
                    lista[4].innerHTML = 0.120+'KG'
                }
                if(event_target0=='Arroz'){
                    lista[0].innerHTML = document.querySelector('#id_txt').value
                    lista[1].innerHTML = document.querySelector('#nome').value
                    lista[2].innerHTML = document.querySelector('#marca').value
                    lista[3].innerHTML = document.querySelector('#unidade').value*6
                    lista[4].innerHTML = 5+'KG'
                }
                if(event_target0=='Açucar'||event_target0=='Feijão'){
                    lista[0].innerHTML = document.querySelector('#id_txt').value
                    lista[1].innerHTML = document.querySelector('#nome').value
                    lista[2].innerHTML = document.querySelector('#marca').value
                    lista[3].innerHTML = document.querySelector('#unidade').value*20
                    lista[4].innerHTML = 1+'KG'
                }
            }else{
                for(a=0;a<document.querySelectorAll('#span_a #valor_produtos').length;a++){
                    if(document.querySelectorAll('#span_a #valor_produtos p')[1].innerHTML==document.querySelector('#span_b #nome').value){
                        if(event_target0=='Bebida Alcoólica'){
                            document.querySelectorAll('#span_a #valor_produtos p')[3].innerHTML=parseInt(document.querySelectorAll('#span_a #valor_produtos p')[3].innerHTML)+(parseInt(document.querySelector('#span_b #unidade').value)*12)
                            console.log(document.querySelectorAll('#span_a #valor_produtos p')[3].innerHTML)}
                    }
                }
            }
            for(a=0;a<lista.length;a++){

                tag.appendChild(lista[a])
            }
            document.querySelector('#span_a').appendChild(tag);
            for(a=0;a<document.querySelectorAll('#span_b input').length;a++){
                    document.querySelectorAll('#span_b input')[a].value=''
                };
        }

        //Funções de click nos sidebars button
        document.querySelector('#botao_a').addEventListener('click', function(){
            document.querySelector('#span_a').style.opacity='100%'
            ativa_animacao('#tela_0');
            anima_return('#span_a');
            setTimeout(function(){
            document.querySelector('#tela_0').style.display='none';},890);
            ativar_span('#span_a', '#botao_a')
            document.querySelector('#span_b').style.opacity='0%'
            document.querySelector('#span_c').style.opacity='0%'
        },
        // {once:true
        // }
    );
        
        document.querySelector('#botao_b').addEventListener('click', function(){
            document.querySelector('#span_b').style.opacity='100%'
            ativa_animacao('#tela_0');
            anima_return('#span_b');
            setTimeout(function(){
                document.querySelector('#tela_0').style.display='none';},890);
            ativar_span('#span_b', '#botao_b');
            document.querySelector('#span_a').style.opacity='0%'
            document.querySelector('#span_c').style.opacity='0%'
        })
        
        document.querySelector('#botao_c').addEventListener('click', function(){
            document.querySelector('#span_c').style.opacity='100%'
            ativa_animacao('#tela_0');
            anima_return('#span_c');
            setTimeout(function(){
                document.querySelector('#tela_0').style.display='none';},890);
            ativar_span('#span_c', '#botao_c');
            document.querySelector('#span_a').style.opacity='0%'
            document.querySelector('#span_b').style.opacity='0%'
        })
        
        document.querySelector('#confirma_cadastro').addEventListener('click', function(){criar_prd()})

    </script>
</body>
</html>
