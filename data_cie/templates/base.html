<script> 
    //retira o evento de click no input 
    for(a=0;a<document.querySelectorAll('#info_city input').length;a++){
        document.querySelectorAll('#info_city label')[a].style.pointerEvents='none'
        document.querySelectorAll('#info_city input')[a].style.pointerEvents='none'
    }
    
    function animar_slide(valor, valor0, valor1){
        document.querySelector('#info_prev').animate([{right:`${valor0}%`},{right:`${valor1}%`}],{duration:1000})
        document.querySelectorAll('#info_prev span')[valor].animate([{opacity:'100%'},{opacity:'0%'}],{duration:500})
        setTimeout(function(){document.querySelectorAll('#info_prev span')[valor].style.opacity='0%'})
        document.querySelector('#info_prev').style.right=`${valor1}%`
    }
    function teste(){
        setTimeout(function(){animar_slide(0, -75, -46)},5000)     
        setTimeout(function(){
            animar_slide(1, -46, -17)
        }, 10000);
        // setTimeout(function(){
        //     animar_slide(2, -17, 12)
        // }, 10000);
    
        // setTimeout(function(){
        //     animar_slide(3, 12, 41)
        // }, 15000);
        
        // setTimeout(function(){
        //     animar_slide(4, 41, 70)
        // }, 20000);
        
    }
    //arrumar a logica de requisição da prev
    setTimeout(function(){teste()},500)
    setInterval(function(){
        document.querySelector('#info_prev').style.right='-75%'
        document.querySelectorAll('#info_prev span')[0].style.opacity='100%'
        document.querySelectorAll('#info_prev span')[1].style.opacity='100%'
        setTimeout(function(){teste()},1000)
    }, 12500)
</script>
