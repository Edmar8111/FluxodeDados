    }
    body form{

    }

    }
    #info_city input{
        display: flex;

        font-size: 25px;

        border:none;
        margin:10px 0px;
        background-color: unset;
        font-family: "Caveat", serif;
    }
    
    #info_city label{
        display: flex;
        justify-content: center;

        font-size:25px;
        font-family: "Caveat", serif;
        font-weight: 700

    form input{

        border-left:none;
        border-right:none;
        outline:none;
    }
    form input:focus{
        opacity: 50%;
    }
    form button{
        border:none;
        background-color: darkcyan;
        border-radius:20px;
        cursor: pointer;
    }
    form button:hover{
        background-color: cadetblue;
        transition: 0.5s;
    }
    form button img{

    }
    #info_prev span{
        display: flex;
        align-items:center;

        border-radius: 10px;

    }
    #info_prev span p{
        color: aliceblue;
        font-family: "caveat", serif;
        font-size: larger;
        margin-top:5px;
    }
    section #button_grafico:hover{
        color:gray;
        transition: 0.5s;

</head>

        <label id="label_min" style="position:relative;margin-left:-50px;top:-349px;font-size: 20px;" for="windchill">Mín</label>

            <label for="max_tmp5" style="position: fixed;margin-top: 55px;margin-left: -70px;">Máxima</label>

    </footer>
<script>
    setInterval(function (){document.querySelectorAll('#stand_by img')[0].animate([{opacity:'100%'},{opacity:'50%'}, {opacity:'100%'}],{duration:1250})
    }, 1255)
    document.querySelector('#button_grafico').addEventListener('mouseover', function(){
        document.querySelector('#button_grafico').style.color='cornsilk',document.querySelector('#button_grafico').style.backgroundColor='cadetblue',
        document.querySelector('#button_grafico').style.boxShadow='2px 3px 1px black'
    })
    document.querySelector('#button_grafico').addEventListener('mouseout', function(){
        document.querySelector('#button_grafico').style.color='aliceblue',document.querySelector('#button_grafico').style.backgroundColor='darkcyan',
        document.querySelector('#button_grafico').style.boxShadow='0px 0px 0px black'
    })
   

    function animar_slide(valor){
        document.querySelectorAll('#info_prev span')[valor].animate([{right:'35px', opacity:'100%'},{right:'65px', opacity:'0%'}],{duration:500})
        setTimeout(function(){document.querySelectorAll('#info_prev span')[valor].style.display='none'},490)
    }
    function animar_slide0(valor0){
        document.querySelectorAll('#info_prev span')[valor0].style.display='flex'
        document.querySelectorAll('#info_prev span')[valor0].animate([{right:'-200px'},{right:'35px'}],{duration:500})
        
    }
    if(window.location.reload){
        if(document.querySelector('#humidity').value!=''){
            document.querySelector('#stand_by').style.display='none'
            document.querySelector('#button_grafico').style.display='block'
            document.querySelector('#info_prev').style.display='block'
            document.querySelector('#info_city').style.display='flex'
        }
    }
    for(a=0;a<document.querySelectorAll('#info_city input').length;a++){
        document.querySelectorAll('#info_city label')[a].style.pointerEvents='none'
        document.querySelectorAll('#info_city input')[a].style.pointerEvents='none'
    }
    for(b=0;b<document.querySelectorAll('#info_prev span input').length;b++){
        document.querySelectorAll('#info_prev span input')[b].style.pointerEvents='none'
    }
    
    for(c=0;c<document.querySelector('#info_prev span').length;c++){
        document.querySelectorAll('#info_prev span')[c].style.zIndex='0'
        document.querySelectorAll('#info_prev span')[c].style.right='0px'
    }
    valor=0
    setInterval(function(){
        animar_slide(valor)
        if(valor<7){
            valor=valor+1
        }
        if(valor>=6){
            valor=0
        }
        setTimeout(function(){
        animar_slide0(valor)},1000)
        console.log(valor)
    },5000)
</script>
