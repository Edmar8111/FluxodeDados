<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body section{
        display: flex;
        width:100%;
        top: 0;
        background-color: aqua;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        border: 1px solid;
        text-align-last:center;
        }
    #nav_bar #side_bar{
        display:flex;
        position:relative;
        align-self: self-end;
        margin-right:5px;
    }
    #nav_bar #logo_home{
        display:flex;
        position:relative;
        align-self:baseline;
        margin-left:5px;
        top:15px;

    }
    #second_bar{
        width:100%;
        display:flex;
        flex-direction: row;
    }
    #side_bar_0{
        width:100%;
        display: flex;
        flex-direction: row;
    }
    </style>
</head>
<body>
    <section id="nav_bar" >
        <div id="logo_home">Logo</div>
        <div id="side_bar">
            <img src="https://www.svgrepo.com/show/394298/nav-icon-grid.svg" style="width:25px;">
            
            <img src="https://www.svgrepo.com/show/532587/cookie.svg" style="width:25px;">
            <button><img src="https://www.svgrepo.com/show/532362/user.svg" style="width:25px;">Login</button>
        </div>
    </section>
    <section id="second_bar">
        <div id="side_bar_0" style='margin-left:5px;'>
            <img src="https://www.svgrepo.com/show/394297/nav-icon-a.svg" alt="" style="width: 25px;">
            <a href="#">Ministerio do Trabalho e Emprego</a>
        </div>
        <img src="https://www.svgrepo.com/show/532555/search.svg" style="width: 25px;margin-left:5px;">
    </section>
</body>
</html>
