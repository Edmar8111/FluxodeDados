<script>
//atividade 6
function exec6(inputvalue=12,inputvalue0=15.5,inputvalue1=8.5){
	return console.log(`hambúrguer R$${parseFloat(inputvalue).toFixed(2)} Cheeseburger R$${parseFloat(inputvalue0).toFixed(2)} Fritas R$${parseFloat(inputvalue1).toFixed(2)}`)
}

//atividade 7
function exec7(distancia){
	console.log(`O combustível consumido para percorrer 	${distancia}km é ${parseFloat(distancia/15).toFixed(2)}L`)
};

//atividade 8
function exec8(x,c=0){
	return console.log((3/2)*x**2+2*x+c)
};

//atividade 9
function exec9(inputvalue){
	extractPercent=parseFloat(inputvalue)+(inputvalue*0.28) //efetua a adição de 28%
	extractPercent0=parseFloat(inputvalue)+(inputvalue*0.45)
	return console.log(`Adicionando 28% ${parseFloat(extractPercent).toFixed(2)} Adicionando 48% ${parseFloat(extractPercent0).toFixed(2)}`)
};

//atividade 10
function exec10(inputvalue){
	min=0;
	hr=0;
	while (parseInt(inputvalue)>=60){ //verifica se ainda há valores a serem computados
		if(parseInt(inputvalue)>=60){
			min++
			inputvalue-=60
		};
		if(parseInt(min)>=60){
			hr++
			min-=60
		};
	};
	return console.log(` ${hr}:${min}:${inputvalue}`)
};

//atividade 11
function exec11(nomeFunc, valorinput){
	addComissao=valorinput*50
	valuePercent=addComissao+(addComissao*0.05)
	return console.log(`O valor final do vendedor: ${nomeFunc} é R$${parseFloat(valuePercent+600).toFixed(2)}`)
};

//atividade 12
function exec12(inputvalue, inputvalue0, inputvalue1=8){
	valueReal=0
	carteiras=0
	anualValue=12*(inputvalue0*30)
	contAno=anualValue*parseInt(inputvalue)
	valueSequence=contAno
	while(contAno>=20){
		if(contAno>=20){
		valueReal+=inputvalue1;
		contAno-=20;
		carteiras++
		};
	};
	return console.log(`Maços por dia:${inputvalue0} por ano:${anualValue} ${carteiras} carteiras, contabilizando por ${inputvalue}ano(s):${valueSequence} valor final:R$${parseFloat(valueReal).toFixed(2)}`)
};

//atividade 13
function exec13(inputvalue){
	cobreValue=parseFloat(inputvalue)*0.70
	zincoValue=parseFloat(inputvalue)*0.30
	
	return console.log(`${inputvalue}kg de latão em quantidade de cobre: ${parseFloat(cobreValue).toFixed(1)}Kg, zinco: ${parseFloat(zincoValue).toFixed(1)}Kg`)
};

//atividade 14
function exec14(inputvalue, inputvalue0, inputvalue1){
	totalDias=0
	mesCount=0
	dateNow=new Date()
	convertAnotoDia=(parseInt(dateNow.getFullYear())-inputvalue)*365
	while(parseInt(inputvalue0)>parseInt(dateNow.getMonth())){inputvalue0-=1;mesCount++};
	convertMestoDia=30*mesCount
	totalDias=(convertAnotoDia+convertMestoDia)-inputvalue1
	return console.log(`${parseInt(dateNow.getFullYear())-inputvalue}ano(s) ${mesCount}mes e ${inputvalue1}dias somando total em dias:${totalDias}`)
};

//atividade 15
function exec15(inputvalue){
	countMes=0
	countAnoFixed=0
	while(parseInt(inputvalue)>=30){countMes++;inputvalue-=30};
	while(parseInt(countMes)>=12){countAnoFixed++;countMes-=12}
	return console.log(`Anos:${countAnoFixed} Mês${countMes} Dias${inputvalue}`)
};

//atividade 16
function exec16(inputvalue,inputvalue0,inputvalue1){
	mediaValue=((parseFloat(inputvalue)*2)+(parseFloat(inputvalue0)*3)+(parseFloat(inputvalue1)*5))/(2+3+5);
	return console.log(`Media do aluno: ${parseFloat(mediaValue).toFixed(1)}`)
};
//atividade 17
function exec17(inputvalue,inputvalue0,inputvalue1,inputvalue2){
	Ab=((inputvalue-inputvalue0)*(inputvalue-inputvalue0))+((inputvalue-inputvalue1)*(inputvalue-inputvalue2))
	calcValue=Math.sqrt(Ab)
	console.log(parseFloat(calcValue).toFixed(1))	
};
exec17(10, 50, 35, 18)
</script>
